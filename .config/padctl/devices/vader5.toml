[device]
name = "Flydigi Vader 5 Pro"
vid = 0x37d7
pid = 0x2401
block_kernel_drivers = ["xpad"]

# Only IF1 is used. IF0 is vendor-class (bInterfaceClass=255) with no
# hidraw node; the reference driver also uses IF1 exclusively.
[[device.interface]]
id = 1
class = "hid"      # hidraw; EP2 IN 32B extended input, EP6 OUT 32B config commands

[device.init]
interface = 1
report_size = 32
commands = [
    "5aa5 0102 03",
    "5aa5 a102 a3",
    "5aa5 0202 04",
    "5aa5 0402 06",
]
response_prefix = [0x5a, 0xa5]
enable  = "5aa5 1107 ff01 ffff ff15 00"
disable = "5aa5 1107 ff00 ffff ff14 00"

# --- IF1 extended input (magic 5a a5 ef, 32 bytes) ---
[[report]]
name = "extended"
interface = 1
size = 32

[report.match]
offset = 0
expect = [0x5a, 0xa5, 0xef]

[report.fields]
left_x  = { offset = 3,  type = "i16le" }
left_y  = { offset = 5,  type = "i16le", transform = "negate" }
right_x = { offset = 7,  type = "i16le" }
right_y = { offset = 9,  type = "i16le", transform = "negate" }
lt      = { offset = 15, type = "u8" }
rt      = { offset = 16, type = "u8" }
gyro_x  = { offset = 17, type = "i16le" }
gyro_y  = { offset = 21, type = "i16le", transform = "negate" }
gyro_z  = { offset = 19, type = "i16le" }
accel_x = { offset = 23, type = "i16le" }
accel_y = { offset = 25, type = "i16le" }
accel_z = { offset = 27, type = "i16le" }

[report.button_group]
source = { offset = 11, size = 4 }
# Bit layout (byte 11 bit 0 = bit 0, byte 14 bit 7 = bit 31). Less-common
# Vader 5 buttons have known bit positions but are disabled by default
# under [output.buttons] below — uncomment those lines to route them:
#   C  = 16   (extra face button, right of Y)
#   Z  = 17   (extra face button, left of A)
#   LM = 22   (top paddle, left shoulder)
#   RM = 23   (top paddle, right shoulder)
# Comment syntax does not work inside TOML inline tables, so the bits
# remain present below but the output side controls whether they fire.
map = { DPadUp = 0, DPadRight = 1, DPadDown = 2, DPadLeft = 3, A = 4, B = 5, Select = 6, X = 7, Y = 8, Start = 9, LB = 10, RB = 11, LS = 14, RS = 15, C = 16, Z = 17, M1 = 18, M2 = 19, M3 = 20, M4 = 21, LM = 22, RM = 23, O = 24, Home = 27 }

# --- Commands ---
[commands.rumble]
interface = 1
template = "5a a5 12 06 {strong:u8} {weak:u8} 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00"

[commands.rumble.checksum]
algo = "sum8"
range = [2, 8]
offset = 8

# --- Output device ---
# Masquerade as Xbox Elite Series 2 (VID 045e PID 0b00) so that Steam and
# most games apply Xbox button mappings without additional configuration.
[output]
name = "Xbox Elite Series 2"
vid = 0x045e
pid = 0x0b00

[output.axes]
left_x  = { code = "ABS_X",  min = -32768, max = 32767, fuzz = 16, flat = 128 }
left_y  = { code = "ABS_Y",  min = -32768, max = 32767, fuzz = 16, flat = 128 }
right_x = { code = "ABS_RX", min = -32768, max = 32767, fuzz = 16, flat = 128 }
right_y = { code = "ABS_RY", min = -32768, max = 32767, fuzz = 16, flat = 128 }
lt      = { code = "ABS_Z",  min = 0, max = 255 }
rt      = { code = "ABS_RZ", min = 0, max = 255 }

[output.buttons]
A      = "BTN_SOUTH"
B      = "BTN_EAST"
X      = "BTN_NORTH"
Y      = "BTN_WEST"
LB     = "BTN_TL"
RB     = "BTN_TR"
Select = "BTN_SELECT"
Start  = "BTN_START"
Home   = "BTN_MODE"
LS     = "BTN_THUMBL"
RS     = "BTN_THUMBR"
M1     = "BTN_TRIGGER_HAPPY5"
M2     = "BTN_TRIGGER_HAPPY7"
M3     = "BTN_TRIGGER_HAPPY6"
M4     = "BTN_TRIGGER_HAPPY8"
O      = "BTN_TRIGGER_HAPPY9"
# Less-common Vader 5 buttons — uncomment to expose to userland.
# Input-side bit positions are declared in [report.button_group].map above
# (C=16, Z=17, LM=22, RM=23). The BTN_TRIGGER_HAPPY* targets are arbitrary
# but distinct from the M1–M4 block above; renumber if they collide with
# mappings you use.
C      = "BTN_TRIGGER_HAPPY1"
Z      = "BTN_TRIGGER_HAPPY2"
LM     = "BTN_TRIGGER_HAPPY3"
RM     = "BTN_TRIGGER_HAPPY4"

[output.dpad]
type = "hat"

[output.aux]
type = "mouse"
name = "Vader 5 Pro Virtual Mouse"

[output.force_feedback]
type = "rumble"
max_effects = 16
