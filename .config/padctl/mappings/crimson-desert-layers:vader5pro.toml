# Device: Flydigi Vader 5 Pro
name = "Crimson Desert Layers:Vader 5 Pro"
trigger_threshold = 100

[remap]
# M1 = layer, mainly RB+button combos       # right front paddle
# M2 = layer, mainly LB+button combos       # left front paddle
M3 = "RS"                                   # right back paddle
M4 = "LS"                                   # left back paddle
RM = "RB"                                   # right extra bumper
LM = "LB"                                   # left extra bumper
# RB = left as is
# LB = left as is

# I click LS/RS inadvertently, unmap
LS = "disabled"
RS = "disabled"

# Menu screens
C = "KEY_M"                                 # Map
Z = "KEY_I"                                 # Inventory

[gyro]
mode        = "joystick"  # "joystick", "mouse" or "off"
blend_stick = true
target      = "right_stick"
activate    = "LT"
sensitivity = 50.0
deadzone    = 10
smoothing   = 0.1
invert_y    = true

# CD's window for button chords is too tight plus RB is an action in
# addition to effectively being a chording key. This makes RB+button
# combos tough to pull off consistently, sometimes whiffing into light
# attacks instead.
#
# This layer makes RB+button chords feel more consistent by removing
# the overload of RB as both an attack button and a chording button.
# The layer handles chords letting RB be just an attack button.
[[layer]]
name = "skills 1"
trigger = "M1"                              # right front paddle
activation = "hold"
hold_timeout = 1

[layer.remap]
# These mimic default RB+button bindings
RT = "macro:turning_slash"
X  = "macro:unarmed"
Y  = "macro:stab"
A  = "macro:spinning_slash"
B  = "macro:evasive_slash"
# New bindings for convenience
M2 = "RB"                                   # light attack, for combos
LT = "macro:switch_weapon"                  # RB+LT is otherwise unused

# Do the same things for LB+button chords.
[[layer]]
name = "skills 2"
trigger = "M2"                              # left front paddle
activation = "hold"
hold_timeout = 1

[layer.remap]
# These mimic default LB+button bindings
RT = "macro:shield_bash"
LT = "macro:switch_weapon"
# New bindings for convenience
M1 = "RB"                                   # light attack, for combos
X  = "macro:unarmed"

# Menu screens
C = "KEY_K"                                 # Skills
Z = "KEY_J"                                 # Journal
Start = "KEY_P"                             # Photo mode

[[macro]]
name = "unarmed"
steps = [{ down = "RB" }, { down = "X" }, "pause_for_release", { up = "X" }, { up = "RB" }]

[[macro]]
name = "stab"
steps = [{ down = "RB" }, { down = "Y" }, "pause_for_release", { up = "Y" }, { up = "RB" }]

[[macro]]
name = "spinning_slash"
steps = [{ down = "RB" }, { down = "A" }, "pause_for_release", { up = "A" }, { up = "RB" }]

[[macro]]
name = "evasive_slash"
steps = [{ down = "RB" }, { down = "B" }, "pause_for_release", { up = "B" }, { up = "RB" }]

[[macro]]
name = "turngin_slash"
steps = [{ down = "RB" }, { down = "RT" }, "pause_for_release", { up = "B" }, { up = "RB" }]

[[macro]]
name = "shield_bash"
steps = [{ down = "LB" }, { down = "RT" }, "pause_for_release", { up = "RT" }, { up = "RB" }]

[[macro]]
name = "switch_weapon"
steps = [{ down = "LB" }, { down = "LT" }, "pause_for_release", { up = "LT" }, { up = "LB" }]
